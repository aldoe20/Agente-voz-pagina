<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Agente con voz - Teams</title>
</head>
<body>

    <h2>Agente con voz</h2>

    <input type="text" id="inputTexto" placeholder="Escribe o usa la voz..." />
    <button onclick="enviarTexto()">Enviar</button>
    <button onclick="hablar()">🎤 Hablar</button>

    <p id="estado"></p>
    <p id="respuesta"></p>

<script>

// 🔹 COPILOT CONFIG
const tokenEndpoint = "https://f1961b2c14e1e41bb646d75d750e21.0c.environment.api.powerplatform.com/powervirtualagents/botsbyschema/cr61c_Agenteconexiondevoz/directline/token?api-version=2022-03-01-preview";

// 🔹 AZURE SPEECH
const speechKey = "7XEttQQXjFfcl8wQJyN8J6Y8sQhSnu5fqsLceYRIE4nf29Ip27J9JQQJ99CFACYeBjFXJ3w3AAAYACOGLZIC";
const speechRegion = "eastus"; // ejemplo: centralus

let directLineToken;
let directLineDomain;
let conversationId;
let watermark;
let procesando = false;
let inicializado = false;

const userId = "user-" + Math.random().toString(36).substring(2, 10);

// ================= INIT =================
async function inicializarBot() {

    const apiVersion = new URL(tokenEndpoint).searchParams.get("api-version");
    const baseUrl = new URL(tokenEndpoint).origin;

    const regional = await fetch(`${baseUrl}/powervirtualagents/regionalchannelsettings?api-version=${apiVersion}`);
    const regionalData = await regional.json();

    directLineDomain = new URL("v3/directline", regionalData.channelUrlsById.directline).toString().replace(/\/$/, "");

    const tokenRes = await fetch(tokenEndpoint);
    const tokenData = await tokenRes.json();
    directLineToken = tokenData.token;

    const conv = await fetch(`${directLineDomain}/conversations`, {
        method: "POST",
        headers: { "Authorization": `Bearer ${directLineToken}` }
    });

    const convData = await conv.json();
    conversationId = convData.conversationId;

    // iniciar conversación
    await esperar(1500);

    await drenarInicial();

    inicializado = true;
    document.getElementById("estado").innerText = "Listo";
}

// ================= LIMPIAR INICIO =================
async function drenarInicial() {
    const res = await fetch(`${directLineDomain}/conversations/${conversationId}/activities`, {
        headers: { "Authorization": `Bearer ${directLineToken}` }
    });
    const data = await res.json();
    watermark = data.watermark;
}

// ================= ENVIAR TEXTO =================
async function enviarTexto() {

    if (!inicializado || procesando) return;

    const texto = document.getElementById("inputTexto").value;

    procesando = true;
    document.getElementById("estado").innerText = "Procesando...";

    await fetch(`${directLineDomain}/conversations/${conversationId}/activities`, {
        method: "POST",
        headers: {
            "Authorization": `Bearer ${directLineToken}`,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            type: "message",
            from: { id: userId, role: "user" },
            text: texto
        })
    });

    const respuesta = await esperarRespuesta();

    document.getElementById("respuesta").innerText = respuesta;

    procesando = false;
    document.getElementById("estado").innerText = "Listo";
}

// ================= ESPERAR RESPUESTA =================
async function esperarRespuesta() {

    for (let i = 0; i < 15; i++) {

        const url = watermark
            ? `${directLineDomain}/conversations/${conversationId}/activities?watermark=${encodeURIComponent(watermark)}`
            : `${directLineDomain}/conversations/${conversationId}/activities`;

        const res = await fetch(url, {
            headers: { "Authorization": `Bearer ${directLineToken}` }
        });

        const data = await res.json();

        if (data.watermark) watermark = data.watermark;

        const botMsgs = data.activities.filter(a =>
            a.type === "message" &&
            a.from.role === "bot" &&
            a.text
        );

        if (botMsgs.length > 0) {
            return botMsgs[botMsgs.length - 1].text;
        }

        await esperar(1200);
    }

    return "Sin respuesta";
}

// ================= VOZ (AZURE) =================
async function hablar() {

    document.getElementById("estado").innerText = "Grabando...";

    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    const recorder = new MediaRecorder(stream);
    let chunks = [];

    recorder.ondataavailable = e => chunks.push(e.data);

    recorder.onstop = async () => {

        document.getElementById("estado").innerText = "Transcribiendo...";

        
const blob = new Blob(chunks, { type: "audio/webm" });

const res = await fetch(
    `https://${speechRegion}.stt.speech.microsoft.com/speech/recognition/conversation/cognitiveservices/v1?language=es-MX`,
    {
        method: "POST",
        headers: {
            "Ocp-Apim-Subscription-Key": speechKey,
            "Content-Type": "audio/webm"
        },
        body: blob
    }
);


        const data = await res.json();

        if (data.DisplayText) {
            document.getElementById("inputTexto").value = data.DisplayText;
            enviarTexto();
        } else {
            document.getElementById("estado").innerText = "No se entendió";
        }

        stream.getTracks().forEach(t => t.stop());
        chunks = [];
    };

    recorder.start();

    setTimeout(() => recorder.stop(), 4000);
}

// ================= UTILS =================
function esperar(ms) {
    return new Promise(r => setTimeout(r, ms));
}

inicializarBot();

</script>

</body>
</html>
